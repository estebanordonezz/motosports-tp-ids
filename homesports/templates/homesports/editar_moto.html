{% extends 'homesports/base.html' %}

{% block title %}Editar moto | MotoSports{% endblock %}

{% block body %}

<div class="row justify-content-center mt-5">
    <div class="col-md-7">
        <div class="card p-4">
            <h2 class="mb-4 text-center">Editar moto</h2>

            <form method="POST" enctype="multipart/form-data">
                {% csrf_token %}

                {{ form.as_p }}

                <button type="submit" class="btn btn-bordo w-100 mt-3">
                    Guardar cambios
                </button>
            </form>

            <a href="{% url 'home' %}" class="btn btn-outline-bordo w-100 mt-3">
                Volver
            </a>
        </div>
    </div>
</div>

{% endblock %}
