{% extends 'homesports/base.html' %}

{% block title %}Eliminar moto | MotoSports{% endblock %}

{% block body %}

<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card p-4 text-center">
            <h2>Eliminar moto</h2>

            <p class="mt-3">
                ¿Seguro que querés eliminar esta moto?
            </p>

            <h4>{{ moto.nombre }}</h4>

            {% if moto.imagen %}
                <img src="{{ moto.imagen.url }}" class="img-fluid rounded mt-3 mb-3" style="max-height: 250px; object-fit: cover;">
            {% endif %}

            <form method="POST" class="mt-4">
                {% csrf_token %}

                <button type="submit" class="btn btn-danger">
                    Sí, eliminar
                </button>

                <a href="{% url 'home' %}" class="btn btn-outline-bordo">
                    Cancelar
                </a>
            </form>
        </div>
    </div>
</div>

{% endblock %}
