<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MotoSports{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        body {
            background:
                radial-gradient(circle at left 35%, rgba(123, 30, 43, 0.35), transparent 28%),
                radial-gradient(circle at right 35%, rgba(123, 30, 43, 0.35), transparent 28%),
                #111;
            color: #f5f5f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
        }

        .navbar {
            background-color: #1a1a1a;
            border-bottom: 2px solid #7b1e2b;
        }

        .navbar-brand {
            color: #b83246 !important;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .nav-link {
            color: #f5f5f5 !important;
        }

        .nav-link:hover {
            color: #b83246 !important;
        }

        .hero {
            background: linear-gradient(135deg, #1a1a1a, #3a0d16);
            border-radius: 15px;
            padding: 60px 30px;
            margin-top: 40px;
            box-shadow: 0 0 25px rgba(123, 30, 43, 0.45);
        }

        .btn-bordo {
            background-color: #7b1e2b;
            color: white;
            border: none;
        }

        .btn-bordo:hover {
            background-color: #a52a3a;
            color: white;
        }

        .btn-outline-bordo {
            color: #d64b5f;
            border: 1px solid #7b1e2b;
        }

        .btn-outline-bordo:hover {
            background-color: #7b1e2b;
            color: white;
        }

        .card {
            background-color: rgba(28, 28, 28, 0.92);
            color: #f5f5f5;
            border: 1px solid #7b1e2b;
            box-shadow: 0 0 18px rgba(123, 30, 43, 0.25);
        }

        .card:hover {
            box-shadow: 0 0 25px rgba(123, 30, 43, 0.45);
            transform: translateY(-2px);
            transition: 0.2s;
        }

        .moto-img {
            height: 220px;
            object-fit: cover;
            border-bottom: 1px solid #7b1e2b;
            background-color: #222;
        }

        .form-control,
        .form-select,
        input,
        textarea,
        select {
            background-color: #151515 !important;
            color: #f5f5f5 !important;
            border: 1px solid #7b1e2b !important;
        }

        .form-control:focus,
        .form-select:focus,
        input:focus,
        textarea:focus,
        select:focus {
            background-color: #151515 !important;
            color: #fff !important;
            border-color: #b83246 !important;
            box-shadow: 0 0 0 0.2rem rgba(184, 50, 70, 0.25) !important;
        }

        label {
            margin-bottom: 6px;
            font-weight: 500;
        }

        a {
            color: #d64b5f;
        }

        a:hover {
            color: #ff6b7f;
        }

        .footer {
            margin-top: auto;
            padding: 20px;
            background-color: #1a1a1a;
            color: #aaa;
            text-align: center;
            border-top: 1px solid #7b1e2b;
        }

        .footer p {
            margin: 0;
        }

        .usuario-texto {
            color: #ddd;
            font-size: 0.9rem;
            margin-right: 12px;
        }

        .helptext {
            color: #aaa;
            font-size: 0.85rem;
        }

        ul.errorlist {
            color: #ff6b7f;
            list-style: none;
            padding-left: 0;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'index' %}">MotoSports</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto align-items-lg-center">
                <li class="nav-item">
                    <a href="{% url 'index' %}" class="nav-link">Inicio</a>
                </li>

                <li class="nav-item">
                    <a href="{% url 'home' %}" class="nav-link">Motos</a>
                </li>

                {% if user.is_authenticated %}
                    <li class="nav-item">
                        <a href="{% url 'crear_moto' %}" class="nav-link">Agregar moto</a>
                    </li>

                    <li class="nav-item">
                        <span class="usuario-texto">Hola, {{ user.username }}</span>
                    </li>

                    <li class="nav-item">
                        <form method="POST" action="{% url 'logout' %}">
                            {% csrf_token %}
                            <button type="submit" class="btn btn-outline-bordo btn-sm">
                                Cerrar sesión
                            </button>
                        </form>
                    </li>
                {% else %}
                    <li class="nav-item me-2">
                        <a href="{% url 'login' %}" class="btn btn-outline-bordo btn-sm">
                            Iniciar sesión
                        </a>
                    </li>

                    <li class="nav-item">
                        <a href="{% url 'registro' %}" class="btn btn-bordo btn-sm">
                            Registrarse
                        </a>
                    </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<main class="container">
    {% block body %}
    {% endblock %}
</main>

<footer class="footer">
    <p>© 2026 MotoSports - Sitio de motos</p>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
